<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GridForge Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="doc" id="doc" data-theme="dark">

  <div class="popup">

    <div class="pp-head">
      <span class="pp-mark">
        <span class="logo-mark" role="img" aria-label="GridForge"></span>
      </span>
      <div class="pp-id">
        <div class="nm">GridForge <span class="pro">Pro</span></div>
        <div class="co">© 上海织源烁影科技发展有限公司</div>
      </div>
      <button class="pp-toggle" id="ppToggle" role="switch" aria-pressed="true" aria-label="切换深色 / 浅色">
        <span class="tlbl">深色</span>
        <span class="mini"><span class="k"></span></span>
      </button>
    </div>

    <div class="pp-divider"></div>

    <div class="steps">
      <div class="step">
        <span class="num">1.</span>
        <div class="txt" id="step1"></div>
      </div>
      <div class="step">
        <span class="num">2.</span>
        <div class="txt" id="step2"></div>
      </div>
    </div>

  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
